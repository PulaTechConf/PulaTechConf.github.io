<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulaTechConf - Login</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <img src="icons/ikona(svitla).png" alt="Conference Logo" class="logo">
                        </div>

                        <ul class="nav nav-tabs mb-4" id="authTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="reset-tab" data-bs-toggle="tab" data-bs-target="#reset" type="button" role="tab">Reset Password</button>
                            </li>
                        </ul>

                        <div class="tab-content" id="authTabContent">
                            <div class="tab-pane fade show active" id="login" role="tabpanel">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <input type="email" class="form-control" id="loginEmail" placeholder="Email" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                                    </div>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary">Login</button>
                                    </div>
                                    <div class="text-center mt-3">
                                        <a href="#" id="forgotPasswordLink" class="forgot-password">Forgot password?</a>
                                    </div>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="register" role="tabpanel">
                                <form id="registerForm">
                                    <div class="mb-3">
                                        <input type="text" class="form-control" id="firstName" placeholder="First name" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="text" class="form-control" id="lastName" placeholder="Last name" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="text" class="form-control" id="affiliation" placeholder="Organization" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="text" class="form-control" id="country" placeholder="Country" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="email" class="form-control" id="registerEmail" placeholder="Email" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="password" class="form-control" id="registerPassword" placeholder="Password" required>
                                    </div>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary">Register</button>
                                    </div>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="reset" role="tabpanel">
                                <form id="resetPasswordForm">
                                    <div class="mb-3">
                                        <input type="email" class="form-control" id="resetEmail" placeholder="Email" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="text" class="form-control" id="resetLastName" placeholder="Last name" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="password" class="form-control" id="resetNewPassword" placeholder="New password" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="password" class="form-control" id="resetConfirmPassword" placeholder="Confirm new password" required>
                                    </div>
                                    <p class="text-muted small mb-3">Use the same email and last name from registration.</p>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary">Update Password</button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <div id="authMessage" class="alert mt-3 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
